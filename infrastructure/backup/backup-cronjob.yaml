apiVersion: batch/v1
kind: CronJob
metadata:
  name: mysql-backup
  namespace: infrastructure
  labels:
    app.kubernetes.io/name: mysql-backup
    app.kubernetes.io/part-of: gitops-demo
spec:
  # Run every 5 minutes for demonstration purposes
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: mysql-backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: mysqldump
              image: mysql:8.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backups/appdb_backup_${TIMESTAMP}.sql"

                  echo "Starting MySQL backup at $(date)..."
                  echo "Backup file: ${BACKUP_FILE}"

                  mysqldump \
                    --host=mysql.infrastructure.svc.cluster.local \
                    --port=3306 \
                    --user=root \
                    --password="${MYSQL_ROOT_PASSWORD}" \
                    --single-transaction \
                    --routines \
                    --triggers \
                    --databases appdb > "${BACKUP_FILE}"

                  FILESIZE=$(stat -c%s "${BACKUP_FILE}" 2>/dev/null || echo "unknown")
                  echo "Backup completed successfully!"
                  echo "File: ${BACKUP_FILE} (${FILESIZE} bytes)"
                  echo ""
                  echo "--- Existing backups ---"
                  ls -lh /backups/
              env:
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mysql-secret
                      key: MYSQL_ROOT_PASSWORD
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: mysql-backup-pvc
